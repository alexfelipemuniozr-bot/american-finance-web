<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recursos PRO | American Finance</title>

<!-- ✅ Fuente igual al resto del sitio -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">

<style>
:root {
  --bg: #0a0a0a;
  --panel: #111111;
  --gold: #ffd700;
  --gold-dark: #d4af37;
  --text: #ffffff;
  --muted: #c9c9c9;
  --line: rgba(255, 215, 0, 0.1);
  --line-strong: rgba(255, 215, 0, 0.26);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", Arial, sans-serif;
}

body {
  background: 
    radial-gradient(circle at top left, rgba(255, 215, 0, 0.08), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0, 255, 157, 0.04), transparent 24%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.5;
}

/* ✅ MISMO MENÚ QUE EL RESTO DEL SITIO */
.navbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  width: 100%;
  padding: 18px clamp(16px, 5vw, 64px);
  background: rgba(0, 0, 0, 0.78);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(18px);
}

.logo {
  font-size: clamp(22px, 4vw, 30px);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(45deg, var(--gold-dark), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.navbar a {
  color: var(--gold-dark);
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.3s ease;
  padding: 8px 12px;
  border-radius: 8px;
}

.navbar a:hover {
  color: var(--gold);
  background: rgba(255, 215, 0, 0.07);
  text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

/* HEADER */
.header {
  padding: 40px clamp(16px, 5vw, 64px) 20px;
  text-align: center;
}

.header h1 {
  color: var(--gold);
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 900;
  margin-bottom: 10px;
  background: linear-gradient(45deg, var(--gold-dark), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header p {
  color: var(--muted);
  font-size: clamp(15px, 3vw, 18px);
  max-width: 700px;
  margin: 0 auto;
}

/* SEARCH */
.search {
  padding: 10px clamp(16px, 5vw, 64px);
  max-width: 800px;
  margin: 0 auto 30px;
}

.search input {
  width: 100%;
  padding: 16px 20px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(17, 17, 17, 0.7);
  color: var(--text);
  font-size: 17px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  outline: none;
}

.search input::placeholder {
  color: var(--muted);
}

.search input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.12);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
  padding: 20px clamp(16px, 5vw, 64px) 60px;
  max-width: 1400px;
  margin: 0 auto;
}

/* CARD */
.card {
  background: rgba(17, 17, 17, 0.7);
  border: 1px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--gold);
  box-shadow: 0 14px 35px rgba(0, 0, 0, 0.22), 0 0 15px rgba(255, 215, 0, 0.1);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.08);
}

.title {
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  height: 70px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ✅ MODAL MEJORADO */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(12px);
  z-index: 9999;
  padding: 20px;
}

.modal-content {
  position: relative;
  width: 100%;
  max-width: 900px;
  transform: scale(0.9);
  opacity: 0;
  transition: all 0.3s ease;
}

.modal.active .modal-content {
  transform: scale(1);
  opacity: 1;
}

.close {
  position: absolute;
  top: -40px;
  right: 0;
  color: var(--gold);
  font-size: 28px;
  cursor: pointer;
  transition: transform 0.2s ease;
  background: rgba(0,0,0,0.8);
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 1px solid var(--line);
}

.close:hover {
  transform: rotate(90deg);
  color: #fff;
  background: var(--gold);
}

iframe {
  width: 100%;
  height: 480px;
  border-radius: 16px;
  border: 1px solid var(--line);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* ✅ RESPONSIVE PARA CELULAR MEJORADO */
@media (max-width: 767px) {
  .navbar {
    flex-direction: column;
    padding: 14px 18px;
    gap: 12px;
  }

  .nav-links {
    justify-content: center;
    width: 100%;
    gap: 4px;
  }

  .navbar a {
    font-size: 14px;
    padding: 6px 10px;
  }

  .header {
    padding: 25px 16px 15px;
  }

  .header h1 {
    font-size: 24px;
  }

  .search {
    padding: 10px 16px;
    margin-bottom: 20px;
  }

  .search input {
    padding: 14px 16px;
    font-size: 16px;
  }

  .grid {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 10px 16px 40px;
  }

  .card img {
    height: 110px;
  }

  .title {
    font-size: 12px;
    padding: 10px;
    height: 55px;
  }

  iframe {
    height: 240px;
  }

  .close {
    top: -35px;
    right: -5px;
    font-size: 24px;
  }
}

@media (min-width: 768px) and (max-width: 1023px) {
  .grid {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }
  iframe {
    height: 400px;
  }
}

/* MENSAJE DE CARGA / ERROR */
.msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 17px;
}

.loader {
  width: 40px;
  height: 40px;
  border: 3px solid var(--line);
  border-top: 3px solid var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

<body>

<!-- ✅ MENÚ IGUAL AL RESTO DEL SITIO -->
<div class="navbar">
  <div class="logo">American Finance</div>
  <div class="nav-links">
    <a href="index.html">Inicio</a>
    <a href="cursos.html">Cursos</a>
    <a href="mercados.html">Mercados</a>
    <a href="simulador.html">Simulador</a>
    <a href="calculadora.html">Calculadora</a>
    <a href="comunidad.html">Comunidad</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Biblioteca de Recursos PRO</h1>
  <p>Encuentra los mejores videos, tutoriales y análisis financieros seleccionados para ti.</p>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="🔍 Buscar temas, conceptos o estrategias financieras...">
</div>

<!-- CONTENIDO -->
<div id="contenido" class="grid">
  <div class="msg">
    <div class="loader"></div>
    Cargando recursos...
  </div>
</div>

<!-- ✅ MODAL MEJORADO -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="cerrar()">✖</div>
    <iframe id="video" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<script>

const API_KEY = "AIzaSyDtwZy66gMDhQqeLcypx9KP_m_CvZmpRA0";

/* 🔥 1. BUSCAR VIDEOS */
async function buscarVideos(query){
  const contenedor = document.getElementById("contenido");

  try {
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=15&regionCode=ES&relevanceLanguage=es&key=${API_KEY}`
    );

    const data = await res.json();

    if(data.error){
      throw new Error(data.error.message);
    }

    if(!data.items || data.items.length === 0){
      contenedor.innerHTML = "<div class='msg'>😕 No se encontraron resultados para tu búsqueda.</div>";
      return;
    }

    /* 🔥 2. EXTRAER IDS VÁLIDOS */
    let ids = data.items
      .filter(v => v.id && v.id.videoId)
      .map(v => v.id.videoId)
      .join(",");

    if(!ids){
      contenedor.innerHTML = "<div class='msg'>❌ No se pudieron obtener videos válidos.</div>";
      return;
    }

    /* 🔥 3. VALIDAR VIDEOS REALES Y QUE SE PUEDAN VER */
    const res2 = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,status,contentDetails&id=${ids}&key=${API_KEY}`
    );

    const data2 = await res2.json();

    if(!data2.items || data2.items.length === 0){
      contenedor.innerHTML = "<div class='msg'>❌ Error al validar los videos.</div>";
      return;
    }

    /* 🔥 4. SOLO EMBEBIBLES Y SIN RESTRICCIONES */
    let validos = data2.items.filter(v => {
      return v.status && 
             v.status.embeddable === true && 
             v.contentDetails.regionRestriction === undefined;
    });

    if(validos.length === 0){
      contenedor.innerHTML = "<div class='msg'>😕 Los resultados encontrados no permiten ser visualizados aquí.</div>";
      return;
    }

    /* 📺 5. RENDERIZAR */
    render(validos);

  } catch(err){
    console.error(err);
    contenedor.innerHTML = `
    <div class='msg'>
      ⚠️ <br>
      No se pudo conectar con YouTube.<br>
      <small style="color:#999">${err.message}</small>
    </div>`;
  }
}

/* 📺 MOSTRAR LAS TARJETAS */
function render(videos){
  let cont = document.getElementById("contenido");
  cont.innerHTML = "";

  videos.forEach(v => {
    cont.innerHTML += `
    <div class="card" onclick="abrir('${v.id}')">
      <img src="${v.snippet.thumbnails.medium.url || 'https://via.placeholder.com/320x180/111/ffd700?text=Video'}" alt="${v.snippet.title}">
      <div class="title">${v.snippet.title}</div>
    </div>
    `;
  });
}

/* 🎬 ABRIR MODAL CON VIDEO */
function abrir(id){
  if(!id) return;

  const modal = document.getElementById("modal");
  modal.classList.add('active');
  modal.style.display="flex";
  
  document.getElementById("video").src =
  `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;

  // Bloquear scroll del fondo
  document.body.style.overflow = 'hidden';
}

/* ❌ CERRAR MODAL */
function cerrar(){
  const modal = document.getElementById("modal");
  modal.style.display="none";
  modal.classList.remove('active');
  document.getElementById("video").src="";
  
  // Restaurar scroll
  document.body.style.overflow = 'auto';
}

// Cerrar al hacer clic fuera del contenido
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) cerrar();
});

/* 🔎 BUSCADOR DINÁMICO */
let temporizador;
document.getElementById("search").addEventListener("input", function(){
  clearTimeout(temporizador);
  if(this.value.length > 2){
    // Pequeño retraso para no saturar la API
    temporizador = setTimeout(() => {
      buscarVideos(this.value);
    }, 400);
  } else if(this.value.length === 0) {
    buscarVideos("educación financiera");
  }
});

/* 🚀 INICIO: Cargar contenido predeterminado */
window.addEventListener('DOMContentLoaded', () => {
  buscarVideos("educación financiera, finanzas personales, inversiones");
});

</script>

</body>
</html>
