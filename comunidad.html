<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comunidad | American Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{

    background:
    radial-gradient(circle at top left, rgba(212,175,55,0.10), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,255,136,0.06), transparent 25%),
    linear-gradient(180deg,#050505,#0a0a0a,#071510);

    color:white;
    min-height:100vh;
    overflow-x:hidden;

}

/* NAVBAR */

.navbar{

    width:100%;
    padding:20px 60px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.7);

    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(255,255,255,0.05);

    position:sticky;
    top:0;
    z-index:999;

}

.logo{

    font-size:26px;
    font-weight:800;
    color:gold;

}

.nav-links{

    display:flex;
    gap:25px;

}

.nav-links a{

    color:#ccc;
    text-decoration:none;
    transition:0.3s;

}

.nav-links a:hover{
    color:gold;
}

/* HERO */

.hero{

    text-align:center;
    padding:70px 20px 40px;

}

.hero h1{

    font-size:55px;
    line-height:1.1;

}

.hero span{
    color:gold;
}

.hero p{

    margin-top:20px;
    color:#999;
    font-size:18px;

}

/* LAYOUT */

.layout{

    width:100%;
    max-width:1500px;

    margin:auto;
    padding:20px;

    display:grid;
    grid-template-columns:1fr 420px;
    gap:25px;

}

/* PANEL */

.panel{

    background:rgba(255,255,255,0.03);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:24px;

    backdrop-filter:blur(14px);

    overflow:hidden;

    box-shadow:
    0 0 40px rgba(0,0,0,0.4),
    0 0 20px rgba(212,175,55,0.04);

}

/* CREATE POST */

.post-box{
    padding:25px;
}

.create-top{

    display:flex;
    align-items:center;
    margin-bottom:20px;

}

.user-profile{

    display:flex;
    align-items:center;
    gap:15px;

}

.profile-pic{

    width:60px;
    height:60px;

    border-radius:50%;

    background:
    linear-gradient(
        45deg,
        gold,
        #ff00aa,
        #00ff88
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
    font-size:22px;
    font-weight:700;

}

.username{

    font-size:18px;
    font-weight:700;

}

.status{

    color:#888;
    font-size:14px;

}

textarea{

    width:100%;
    min-height:130px;

    background:#0f0f0f;

    border:1px solid #222;

    border-radius:18px;

    padding:18px;

    color:white;

    resize:none;

    font-size:15px;

}

textarea:focus{

    outline:none;
    border-color:gold;

}

.post-actions{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-top:15px;

    gap:15px;

}

.upload-btn{

    background:#111;

    border:1px solid #222;

    padding:12px 16px;

    border-radius:14px;

    cursor:pointer;

    color:#ccc;

    transition:0.3s;

}

.upload-btn:hover{

    border-color:gold;
    color:gold;

}

.publish-btn{

    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(45deg,gold,#ffd700);

    color:black;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

}

.publish-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px rgba(255,215,0,0.3);

}

.reset-btn{

    padding:14px 18px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(45deg,#ff4d4d,#ff1f1f);

    color:white;

    font-weight:700;

    cursor:pointer;

}

#previewContainer{
    margin-top:15px;
}

.preview-image{

    width:100%;

    max-height:450px;

    object-fit:cover;

    border-radius:18px;

    border:1px solid #222;

}

/* FEED */

.feed{
    padding:25px;
}

.post{

    background:#0f0f0f;

    border:1px solid #1f1f1f;

    border-radius:22px;

    padding:20px;

    margin-bottom:25px;

}

.post-header{

    display:flex;
    align-items:center;
    gap:12px;

    margin-bottom:15px;

}

.avatar{

    width:48px;
    height:48px;

    border-radius:50%;

    background:
    linear-gradient(
        45deg,
        gold,
        #00ff88
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
    font-weight:700;

}

.post-user{

    font-weight:700;

}

.post-time{

    font-size:12px;
    color:#777;

}

.post-text{

    color:#ddd;

    line-height:1.7;

    margin-bottom:15px;

}

.post-image{

    width:100%;

    max-height:550px;

    object-fit:cover;

    border-radius:18px;

    border:1px solid #222;

    margin-bottom:15px;

}

.actions{

    display:flex;
    gap:10px;

}

.action-btn{

    flex:1;

    padding:11px;

    border-radius:12px;

    background:#111;

    border:1px solid #222;

    color:#ccc;

    cursor:pointer;

    transition:0.3s;

}

.action-btn:hover{

    border-color:gold;
    color:gold;

}

/* CHAT */

.chat-header{

    padding:20px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    display:flex;
    justify-content:space-between;
    align-items:center;

}

.chat-header h2{
    color:gold;
}

.live{

    color:#00ff88;
    font-size:14px;

}

.chat-messages{

    height:600px;

    overflow-y:auto;

    padding:20px;

    display:flex;
    flex-direction:column;
    gap:12px;

}

.chat-message{

    display:flex;
    gap:10px;

    animation:fade 0.3s ease;

}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.message-avatar{

    width:38px;
    height:38px;

    border-radius:50%;

    background:
    linear-gradient(
        45deg,
        gold,
        #00ff88
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
    font-size:14px;
    font-weight:700;

    flex-shrink:0;

}

.message-content{

    background:#0f0f0f;

    border:1px solid #1f1f1f;

    padding:12px 14px;

    border-radius:16px;

    width:100%;

}

.message-user{

    font-size:14px;
    font-weight:700;

    color:gold;

    margin-bottom:5px;

}

.message-text{

    color:#ddd;
    font-size:14px;
    line-height:1.5;

}

/* CHAT INPUT */

.chat-input{

    padding:20px;

    border-top:1px solid rgba(255,255,255,0.05);

    display:flex;
    gap:10px;

}

.chat-input input{

    flex:1;

    padding:14px;

    border-radius:14px;

    border:1px solid #222;

    background:#0d0d0d;

    color:white;

}

.chat-input input:focus{

    outline:none;
    border-color:gold;

}

.send-btn{

    padding:14px 20px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(45deg,gold,#ffd700);

    color:black;

    font-weight:700;

    cursor:pointer;

}

/* RESPONSIVE */

@media(max-width:1100px){

    .layout{
        grid-template-columns:1fr;
    }

}

@media(max-width:700px){

    .navbar{

        padding:20px;

        flex-direction:column;
        gap:20px;

    }

    .hero h1{
        font-size:38px;
    }

    .nav-links{

        flex-wrap:wrap;
        justify-content:center;

    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        American Finance
    </div>

    <div class="nav-links">

        <a href="index.html">Inicio</a>
        <a href="cursos.html">Cursos</a>
        <a href="simulador.html">Simulador</a>
        <a href="mercados.html">Mercados</a>

    </div>

</div>

<!-- HERO -->

<div class="hero">

    <h1>
        Comunidad <span>American Finance</span>
    </h1>

    <p>
        Aprende, comparte y conversa con otros estudiantes
    </p>

</div>

<!-- LAYOUT -->

<div class="layout">

    <!-- POSTS -->

    <div class="panel">

        <div class="post-box">

            <div class="create-top">

                <div class="user-profile">

                    <div class="profile-pic">
                        A
                    </div>

                    <div>

                        <div class="username">
                            Alex
                        </div>

                        <div class="status">
                            Comparte una idea financiera...
                        </div>

                    </div>

                </div>

            </div>

            <textarea
            id="postInput"
            placeholder="¿Qué quieres publicar hoy?"
            ></textarea>

            <div id="previewContainer"></div>

            <div class="post-actions">

                <label class="upload-btn">

                    📷 Agregar imagen

                    <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    hidden>

                </label>

                <button
                class="publish-btn"
                onclick="crearPost()">

                    Publicar

                </button>

                <button
                class="reset-btn"
                onclick="resetPosts()">

                    🗑 Reiniciar

                </button>

            </div>

        </div>

        <div class="feed" id="feed"></div>

    </div>

    <!-- CHAT -->

    <div class="panel">

        <div class="chat-header">

            <h2>💬 Chat en vivo</h2>

            <div class="live">
                ● EN VIVO
            </div>

        </div>

        <div
        class="chat-messages"
        id="chatMessages"></div>

        <div class="chat-input">

            <input
            id="chatInput"
            placeholder="Escribe un mensaje positivo...">

            <button
            class="send-btn"
            onclick="enviarMensaje()">

                Enviar

            </button>

        </div>

    </div>

</div>

<script>

/* POSTS */

let posts =
JSON.parse(localStorage.getItem("posts")) || [];

let imagenActual = "";

const imageInput =
document.getElementById("imageInput");

/* PREVIEW */

imageInput.addEventListener("change",function(){

    const file = this.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        imagenActual = e.target.result;

        document.getElementById(
            "previewContainer"
        ).innerHTML = `

        <img
        src="${imagenActual}"
        class="preview-image">

        `;

    };

    reader.readAsDataURL(file);

});

/* CREATE POST */

function crearPost(){

    const texto =
    document.getElementById("postInput").value;

    if(!texto.trim() && !imagenActual) return;

    posts.unshift({

        usuario:"Tú",

        texto:texto,

        imagen:imagenActual,

        fecha:new Date().toLocaleString(),

        likes:0

    });

    localStorage.setItem(
        "posts",
        JSON.stringify(posts)
    );

    document.getElementById(
        "postInput"
    ).value = "";

    document.getElementById(
        "previewContainer"
    ).innerHTML = "";

    imagenActual = "";

    imageInput.value = "";

    renderPosts();

}

/* RENDER */

function renderPosts(){

    const feed =
    document.getElementById("feed");

    feed.innerHTML = "";

    posts.forEach((post,index)=>{

        feed.innerHTML += `

        <div class="post">

            <div class="post-header">

                <div class="avatar">
                    ${post.usuario.charAt(0)}
                </div>

                <div>

                    <div class="post-user">
                        ${post.usuario}
                    </div>

                    <div class="post-time">
                        ${post.fecha}
                    </div>

                </div>

            </div>

            ${
                post.texto
                ?
                `
                <div class="post-text">
                    ${post.texto}
                </div>
                `
                :
                ""
            }

            ${
                post.imagen
                ?
                `
                <img
                src="${post.imagen}"
                class="post-image">
                `
                :
                ""
            }

            <div class="actions">

                <button
                class="action-btn"
                onclick="likePost(${index})">

                    ❤️ ${post.likes}

                </button>

                <button class="action-btn">
                    💬 Comentar
                </button>

                <button class="action-btn">
                    📤 Compartir
                </button>

            </div>

        </div>

        `;

    });

}

renderPosts();

/* LIKE */

function likePost(index){

    posts[index].likes++;

    localStorage.setItem(
        "posts",
        JSON.stringify(posts)
    );

    renderPosts();

}

/* RESET */

function resetPosts(){

    const confirmar = confirm(
        "¿Seguro que quieres eliminar todas las publicaciones?"
    );

    if(!confirmar) return;

    posts = [];

    localStorage.removeItem("posts");

    renderPosts();

}

/* CHAT */

const mensajesAuto = [

    "Acabo de terminar la unidad 3 🚀",
    "Hoy aprendí a ahorrar mejor 💰",
    "Las inversiones son interesantes 📈",
    "Ya desbloqueé el nivel 2 🔥",
    "El simulador financiero está genial 😎",
    "Estoy mejorando mis hábitos financieros 💵"

];

const usuariosFake = [

    "Carlos",
    "Sofía",
    "Mateo",
    "Valentina",
    "Daniel",
    "Camila"

];

const palabrasBloqueadas = [

    "odio",
    "basura",
    "idiota",
    "mierda"

];

function contieneNegativo(texto){

    texto = texto.toLowerCase();

    return palabrasBloqueadas.some(p =>
        texto.includes(p)
    );

}

function agregarMensaje(usuario,texto){

    const chat =
    document.getElementById("chatMessages");

    const div =
    document.createElement("div");

    div.className = "chat-message";

    div.innerHTML = `

    <div class="message-avatar">
        ${usuario.charAt(0)}
    </div>

    <div class="message-content">

        <div class="message-user">
            ${usuario}
        </div>

        <div class="message-text">
            ${texto}
        </div>

    </div>

    `;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

}

function mensajeAutomatico(){

    const usuario =
    usuariosFake[
        Math.floor(
            Math.random() * usuariosFake.length
        )
    ];

    const texto =
    mensajesAuto[
        Math.floor(
            Math.random() * mensajesAuto.length
        )
    ];

    agregarMensaje(usuario,texto);

}

setInterval(mensajeAutomatico,3000);

function enviarMensaje(){

    const input =
    document.getElementById("chatInput");

    const texto = input.value;

    if(!texto.trim()) return;

    if(contieneNegativo(texto)){

        alert(
            "Solo se permiten mensajes positivos 🚀"
        );

        return;

    }

    agregarMensaje("Tú",texto);

    input.value = "";

}

document
.getElementById("chatInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){

        enviarMensaje();

    }

});

mensajeAutomatico();
mensajeAutomatico();
mensajeAutomatico();

</script>

</body>
</html>
